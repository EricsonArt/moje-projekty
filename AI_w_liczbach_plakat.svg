<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  AI W LICZBACH – wersja prostsza (styl jak Twoj oryginal)
  Edytowalna w Adobe Illustrator (File > Open).
  Kanwa 1600 x 1000, jednostki = piksele (1 user-unit).
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1600" height="1000" viewBox="0 0 1600 1000">

  <defs>
    <!-- Gradient slupkow rynku (cyjan -> koral) -->
    <linearGradient id="gradGrowth" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#5BC0DE"/>
      <stop offset="1" stop-color="#E07A5F"/>
    </linearGradient>
    <!-- Tlo glowne -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1F2B"/>
      <stop offset="1" stop-color="#0F1521"/>
    </linearGradient>

    <style><![CDATA[
      .title    { font-family: 'Playfair Display','Georgia','Times New Roman',serif; font-weight: 900; fill:#FFFFFF; }
      .subtitle { font-family: 'Playfair Display','Georgia',serif; font-weight: 700; font-style: italic; fill:#FFFFFF; }
      .tagline  { font-family: 'Georgia',serif; font-weight: 400; font-style: italic; fill:#9AA3B2; }
      .h2       { font-family: 'Georgia',serif; font-weight: 700; fill:#FFFFFF; }
      .th       { font-family: 'Georgia',serif; font-weight: 700; font-style: italic; fill:#5BC0DE; }
      .td       { font-family: 'Georgia',serif; font-weight: 700; fill:#FFFFFF; }
      .td-s     { font-family: 'Georgia',serif; font-weight: 400; fill:#E6E8EE; }
      .axis     { font-family: 'Georgia',serif; font-weight: 400; fill:#9AA3B2; }
      .lbl      { font-family: 'Georgia',serif; font-weight: 700; fill:#FFFFFF; }
      .yr       { font-family: 'Georgia',serif; font-weight: 700; fill:#FFFFFF; }
    ]]></style>
  </defs>

  <!-- TLO -->
  <rect x="0" y="0" width="1600" height="1000" fill="url(#bg)"/>

  <!-- ============================================================
       NAGLOWEK
       ============================================================ -->
  <g id="header">
    <text class="title"    x="800" y="78"  font-size="56" text-anchor="middle" letter-spacing="3">AI W LICZBACH</text>
    <text class="subtitle" x="800" y="108" font-size="20" text-anchor="middle">Jak sztuczna inteligencja zdominowala swiat 2020-2026</text>
    <text class="tagline"  x="800" y="138" font-size="16" text-anchor="middle">6 lat • 1 mld+ uzytkownikow • 750 mld USD rynku • 78% firm</text>
  </g>

  <!-- ============================================================
       TABELA 1 (lewa) – TOP 6 AI : firma / uzytkownicy / zastosowanie
       ============================================================ -->
  <g id="tab1" transform="translate(40,170)">
    <!-- Naglowek -->
    <rect x="0" y="0" width="500" height="36" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
    <text class="th" x="14"  y="24" font-size="15">AI</text>
    <text class="th" x="110" y="24" font-size="15">firma</text>
    <text class="th" x="220" y="24" font-size="15">uzytkownicy</text>
    <text class="th" x="350" y="24" font-size="15">zastosowanie</text>

    <!-- Wiersze -->
    <g font-size="13">
      <rect x="0" y="36"  width="500" height="32" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="58">ChatGPT</text>
      <text class="td-s" x="110" y="58">OpenAI</text>
      <text class="td-s" x="220" y="58">800 mln/tydz</text>
      <text class="td-s" x="350" y="58">rozmowy, kod, analiza</text>

      <rect x="0" y="68"  width="500" height="32" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="90">Gemini</text>
      <text class="td-s" x="110" y="90">Google</text>
      <text class="td-s" x="220" y="90">750 mln/mies</text>
      <text class="td-s" x="350" y="90">Search, Gmail, Android</text>

      <rect x="0" y="100" width="500" height="32" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="122">Copilot</text>
      <text class="td-s" x="110" y="122">Microsoft</text>
      <text class="td-s" x="220" y="122">~150 mln</text>
      <text class="td-s" x="350" y="122">Office 365, GitHub</text>

      <rect x="0" y="132" width="500" height="32" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="154">Claude</text>
      <text class="td-s" x="110" y="154">Anthropic</text>
      <text class="td-s" x="220" y="154">19 mln/mies</text>
      <text class="td-s" x="350" y="154">programowanie, biznes</text>

      <rect x="0" y="164" width="500" height="32" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="186">DeepSeek</text>
      <text class="td-s" x="110" y="186">DeepSeek (CN)</text>
      <text class="td-s" x="220" y="186">97 mln/mies</text>
      <text class="td-s" x="350" y="186">open-source, azjat.</text>

      <rect x="0" y="196" width="500" height="32" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="218">Grok</text>
      <text class="td-s" x="110" y="218">xAI / E. Musk</text>
      <text class="td-s" x="220" y="218">35 mln/mies</text>
      <text class="td-s" x="350" y="218">X (Twitter), real-time</text>
    </g>

    <!-- Linie pionowe miedzy kolumnami -->
    <g stroke="#FFFFFF" stroke-width="0.8">
      <line x1="100" y1="0" x2="100" y2="228"/>
      <line x1="210" y1="0" x2="210" y2="228"/>
      <line x1="340" y1="0" x2="340" y2="228"/>
    </g>
  </g>

  <!-- ============================================================
       WYKRES POZIOMY – uzytkownicy
       ============================================================ -->
  <g id="bars" transform="translate(580,170)">
    <text class="h2" x="220" y="0" font-size="20" text-anchor="middle" font-style="italic">miesiecznie aktywni uzytkownicy</text>

    <!-- Os pionowa -->
    <line x1="100" y1="20" x2="100" y2="230" stroke="#FFFFFF" stroke-width="0.8"/>

    <!-- Sloupki – skala: 1 mln = 0.45 px -->
    <!-- ChatGPT 800 -->
    <text class="td" x="95" y="40" text-anchor="end" font-size="13">Chat GPT</text>
    <rect x="100" y="28" width="360" height="20" fill="#5BC0DE"/>
    <text class="td-s" x="468" y="42" font-size="11">800 mln</text>
    <!-- Gemini 750 -->
    <text class="td" x="95" y="62" text-anchor="end" font-size="13">Gemini</text>
    <rect x="100" y="50" width="338" height="20" fill="#5BC0DE"/>
    <text class="td-s" x="446" y="64" font-size="11">750 mln</text>
    <!-- DeepSeek 97 -->
    <text class="td" x="95" y="84" text-anchor="end" font-size="13">DeepSeek</text>
    <rect x="100" y="72" width="44" height="20" fill="#5BC0DE"/>
    <text class="td-s" x="152" y="86" font-size="11">97 mln</text>
    <!-- Grok 35 -->
    <text class="td" x="95" y="106" text-anchor="end" font-size="13">Grok</text>
    <rect x="100" y="94" width="16" height="20" fill="#5BC0DE"/>
    <text class="td-s" x="124" y="108" font-size="11">35 mln</text>
    <!-- Claude 19 -->
    <text class="td" x="95" y="128" text-anchor="end" font-size="13">Claude</text>
    <rect x="100" y="116" width="9" height="20" fill="#5BC0DE"/>
    <text class="td-s" x="117" y="130" font-size="11">19 mln</text>
    <!-- Perplexity 22 -->
    <text class="td" x="95" y="150" text-anchor="end" font-size="13">Perplexity</text>
    <rect x="100" y="138" width="10" height="20" fill="#5BC0DE"/>
    <text class="td-s" x="118" y="152" font-size="11">22 mln</text>

    <!-- Os pozioma + etykiety -->
    <line x1="100" y1="166" x2="470" y2="166" stroke="#FFFFFF" stroke-width="0.6"/>
    <g class="axis" font-size="11">
      <text x="100" y="184" text-anchor="middle">0</text>
      <text x="145" y="184" text-anchor="middle">100</text>
      <text x="190" y="184" text-anchor="middle">200</text>
      <text x="235" y="184" text-anchor="middle">300</text>
      <text x="280" y="184" text-anchor="middle">400</text>
      <text x="325" y="184" text-anchor="middle">500</text>
      <text x="370" y="184" text-anchor="middle">600</text>
      <text x="415" y="184" text-anchor="middle">700</text>
      <text x="460" y="184" text-anchor="middle">800</text>
    </g>
  </g>

  <!-- ============================================================
       TABELA 2 (prawa) – AI W BRANZACH (z briefu)
       ============================================================ -->
  <g id="tab2" transform="translate(1100,170)">
    <!-- Naglowek -->
    <rect x="0" y="0" width="460" height="36" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
    <text class="th" x="14"  y="24" font-size="15">branza</text>
    <text class="th" x="220" y="24" font-size="15">% firm</text>
    <text class="th" x="290" y="24" font-size="15">co konkretnie</text>

    <g font-size="13">
      <rect x="0" y="36"  width="460" height="28" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="55">Telekomunikacja</text>
      <text class="td"   x="220" y="55" fill="#E07A5F">97%</text>
      <text class="td-s" x="290" y="55">optymalizacja sieci, BOK</text>

      <rect x="0" y="64"  width="460" height="28" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="83">Technologia / IT</text>
      <text class="td"   x="220" y="83" fill="#E07A5F">90%+</text>
      <text class="td-s" x="290" y="83">kod, cyberbezp., automaty.</text>

      <rect x="0" y="92"  width="460" height="28" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="111">Healthcare</text>
      <text class="td"   x="220" y="111" fill="#E07A5F">70-85%</text>
      <text class="td-s" x="290" y="111">diagnostyka, leki</text>

      <rect x="0" y="120" width="460" height="28" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="139">Produkcja</text>
      <text class="td"   x="220" y="139" fill="#E07A5F">77%</text>
      <text class="td-s" x="290" y="139">kontrola jakosci, predykcja</text>

      <rect x="0" y="148" width="460" height="28" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="167">Marketing / Sprzedaz</text>
      <text class="td"   x="220" y="167" fill="#E07A5F">65%</text>
      <text class="td-s" x="290" y="167">tresci, kampanie</text>

      <rect x="0" y="176" width="460" height="28" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="195">Finanse / Banki</text>
      <text class="td"   x="220" y="195" fill="#E07A5F">63%</text>
      <text class="td-s" x="290" y="195">wykrywanie oszustw, ryzyko</text>

      <rect x="0" y="204" width="460" height="28" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <text class="td"   x="14"  y="223">Edukacja</text>
      <text class="td"   x="220" y="223" fill="#E07A5F">40-50%</text>
      <text class="td-s" x="290" y="223">personalizacja, oceny</text>
    </g>

    <!-- Linie pionowe -->
    <g stroke="#FFFFFF" stroke-width="0.8">
      <line x1="210" y1="0" x2="210" y2="232"/>
      <line x1="280" y1="0" x2="280" y2="232"/>
    </g>
  </g>

  <!-- ============================================================
       WYKRES SLUPKOWY – RYNEK AI 2020-2030
       ============================================================ -->
  <g id="market" transform="translate(60,500)">
    <text class="h2" x="0" y="0" font-size="22" font-style="italic">Eksplozja rynku AI – wartosc globalna w mld USD</text>

    <!-- Os Y -->
    <g class="axis" font-size="12">
      <text x="50" y="40"  text-anchor="end">2500</text>
      <text x="50" y="120" text-anchor="end">2000</text>
      <text x="50" y="200" text-anchor="end">1500</text>
      <text x="50" y="280" text-anchor="end">1000</text>
      <text x="50" y="360" text-anchor="end">500</text>
      <text x="50" y="420" text-anchor="end">0</text>
    </g>

    <!-- Linia bazowa -->
    <line x1="60" y1="420" x2="1480" y2="420" stroke="#FFFFFF" stroke-width="0.8"/>

    <!-- Sloupki: 1 mld = 0.16 px (2500 = 400 px wys.); baselina y=420 -->
    <!-- 2020 - GPT-3 - 50 -->
    <g transform="translate(120,0)">
      <rect x="0" y="412" width="120" height="8"  fill="url(#gradGrowth)"/>
      <text class="lbl" x="60" y="402" text-anchor="middle" font-size="13">GPT-3</text>
      <text class="yr"  x="60" y="448" text-anchor="middle" font-size="18">2020</text>
    </g>
    <!-- 2021 - Copilot - 90 -->
    <g transform="translate(280,0)">
      <rect x="0" y="406" width="120" height="14" fill="url(#gradGrowth)"/>
      <text class="lbl" x="60" y="396" text-anchor="middle" font-size="13">Copilot</text>
      <text class="yr"  x="60" y="448" text-anchor="middle" font-size="18">2021</text>
    </g>
    <!-- 2022 - ChatGPT - 142 -->
    <g transform="translate(440,0)">
      <rect x="0" y="397" width="120" height="23" fill="url(#gradGrowth)"/>
      <text class="lbl" x="60" y="387" text-anchor="middle" font-size="13">ChatGPT</text>
      <text class="yr"  x="60" y="448" text-anchor="middle" font-size="18">2022</text>
    </g>
    <!-- 2023 - GPT-4 / Claude - 189 -->
    <g transform="translate(600,0)">
      <rect x="0" y="390" width="120" height="30" fill="url(#gradGrowth)"/>
      <text class="lbl" x="60" y="378" text-anchor="middle" font-size="13">GPT-4</text>
      <text class="lbl" x="60" y="367" text-anchor="middle" font-size="13">Claude</text>
      <text class="yr"  x="60" y="448" text-anchor="middle" font-size="18">2023</text>
    </g>
    <!-- 2024 - Claude 4 - 224 -->
    <g transform="translate(760,0)">
      <rect x="0" y="384" width="120" height="36" fill="url(#gradGrowth)"/>
      <text class="lbl" x="60" y="374" text-anchor="middle" font-size="13">Claude 3</text>
      <text class="yr"  x="60" y="448" text-anchor="middle" font-size="18">2024</text>
    </g>
    <!-- 2025 - Claude 4 / GPT-5 - 550 -->
    <g transform="translate(920,0)">
      <rect x="0" y="332" width="120" height="88" fill="url(#gradGrowth)"/>
      <text class="lbl" x="60" y="322" text-anchor="middle" font-size="13">Claude 4</text>
      <text class="lbl" x="60" y="311" text-anchor="middle" font-size="13">GPT-5</text>
      <text class="yr"  x="60" y="448" text-anchor="middle" font-size="18">2025</text>
    </g>
    <!-- 2026 - Claude 4.7 / GPT-5.5 - 900 -->
    <g transform="translate(1080,0)">
      <rect x="0" y="276" width="120" height="144" fill="url(#gradGrowth)"/>
      <text class="lbl" x="60" y="266" text-anchor="middle" font-size="13">Claude 4.7</text>
      <text class="lbl" x="60" y="255" text-anchor="middle" font-size="13">GPT-5.5</text>
      <text class="yr"  x="60" y="448" text-anchor="middle" font-size="18">2026</text>
    </g>
    <!-- 2030 - prognoza - 2100 -->
    <g transform="translate(1280,0)">
      <rect x="0" y="84" width="140" height="336" fill="url(#gradGrowth)"/>
      <text class="lbl" x="70" y="74" text-anchor="middle" font-size="13" font-style="italic">prognoza</text>
      <text class="yr"  x="70" y="448" text-anchor="middle" font-size="18">2030</text>
    </g>
  </g>

  <!-- Drobny przypis na dole -->
  <text class="axis" x="800" y="975" font-size="11" text-anchor="middle" font-style="italic">
    zrodla: Statista, Precedence Research, McKinsey State of AI 2025, OpenAI, Anthropic, Google • opracowanie wlasne
  </text>

</svg>
