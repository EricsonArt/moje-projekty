    short: "AI tworzy produkt cyfrowy za Ciebie"
    long: "Ebook, kurs, landing, lead magnet - gotowe w 48 godzin, dopasowane do Twojej niszy."
    default_package: 2
  - id: "full_loop"
    short: "Pełna pętla: content -> produkt -> sprzedaż"
    long: "Trzy systemy, jedno ustawienie. Content przyciąga, produkt monetyzuje, lejek sprzedaje - 24/7."
