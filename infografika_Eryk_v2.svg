<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1600" height="1100" viewBox="0 0 1600 1100">
<!--
  AI W LICZBACH – infografika
  Plik wektorowy, edytowalny w Adobe Illustrator (File > Open).
  Paleta:
    tlo            #0E1A2B
    tlo-2          #142339
    panel          #152339 / #10203A (zebra)
    akcent-cyan    #4CC9F0
    akcent-teal    #06AED5
    akcent-coral   #F77F5A
    akcent-amber   #FFB454
    akcent-blue    #1F6FEB
    tekst          #F2F4F8
    tekst-dim      #9AA7BD
    linia          #233852
-->

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1A2B"/>
      <stop offset="1" stop-color="#142339"/>
    </linearGradient>

    <linearGradient id="barUsers" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06AED5"/>
      <stop offset="1" stop-color="#4CC9F0"/>
    </linearGradient>

    <linearGradient id="barGrowth" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0"   stop-color="#06AED5"/>
      <stop offset="0.6" stop-color="#FFB454"/>
      <stop offset="1"   stop-color="#F77F5A"/>
    </linearGradient>

    <linearGradient id="barForecast" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1F6FEB"/>
      <stop offset="1" stop-color="#4CC9F0"/>
    </linearGradient>

    <style><![CDATA[
      .ttl     { font-family:'Montserrat','Arial Black',sans-serif; font-weight:900; fill:#F2F4F8; }
      .sub     { font-family:'Montserrat',sans-serif; font-weight:700; fill:#9AA7BD; }
      .h2      { font-family:'Montserrat',sans-serif; font-weight:800; fill:#F2F4F8; }
      .th      { font-family:'Montserrat',sans-serif; font-weight:800; fill:#4CC9F0; }
      .td      { font-family:'Inter','Arial',sans-serif; font-weight:700; fill:#F2F4F8; }
      .td-s    { font-family:'Inter','Arial',sans-serif; font-weight:500; fill:#CDD6E4; }
      .val     { font-family:'Montserrat',sans-serif; font-weight:700; fill:#F2F4F8; }
      .axis    { font-family:'Inter',sans-serif; font-weight:500; fill:#9AA7BD; }
      .yearLbl { font-family:'Montserrat',sans-serif; font-weight:800; fill:#F2F4F8; }
      .modelLbl{ font-family:'Inter',sans-serif; font-weight:700; fill:#CDD6E4; }
    ]]></style>
  </defs>

  <!-- TLO -->
  <rect x="0" y="0" width="1600" height="1100" fill="url(#bgGrad)"/>

  <!-- ===================== NAGLOWEK ===================== -->
  <g id="header">
    <text class="ttl" x="800" y="70"  font-size="56" text-anchor="middle" letter-spacing="2">AI W LICZBACH</text>
    <text class="sub" x="800" y="100" font-size="20" text-anchor="middle">Jak sztuczna inteligencja zdominowala swiat 2020 – 2026</text>
    <text class="sub" x="800" y="128" font-size="15" text-anchor="middle" fill="#7F8CA6">
      6 lat • 1 mld+ uzytkownikow • 750 mld USD rynku • 78% firm
    </text>
  </g>

  <!-- ============================================================
       SEKCJA GORNA – LEWA: poziomy wykres uzytkownikow
       ============================================================ -->
  <g id="usersChart" transform="translate(60,180)">
    <text class="h2" x="0" y="0" font-size="20">Miesiecznie aktywni uzytkownicy</text>
    <text class="axis" x="0" y="22" font-size="12">stan na 2026 r., w milionach</text>

    <!-- Os pionowa -->
    <line x1="150" y1="50" x2="150" y2="330" stroke="#233852" stroke-width="1.2"/>

    <!-- Linie pomocnicze (0,100,200,400,600,800) -->
    <g stroke="#1B2C44" stroke-width="1" stroke-dasharray="3,4">
      <line x1="250" y1="50" x2="250" y2="330"/>
      <line x1="350" y1="50" x2="350" y2="330"/>
      <line x1="450" y1="50" x2="450" y2="330"/>
      <line x1="550" y1="50" x2="550" y2="330"/>
      <line x1="650" y1="50" x2="650" y2="330"/>
    </g>

    <!-- Etykiety osi X -->
    <g class="axis" font-size="11">
      <text x="150" y="350" text-anchor="middle">0</text>
      <text x="250" y="350" text-anchor="middle">100</text>
      <text x="350" y="350" text-anchor="middle">200</text>
      <text x="450" y="350" text-anchor="middle">400</text>
      <text x="550" y="350" text-anchor="middle">600</text>
      <text x="650" y="350" text-anchor="middle">800</text>
    </g>

    <!-- Sloupki (skala: 1 mln = 0.625 px) -->
    <!-- ChatGPT 800 -->
    <text class="modelLbl" x="145" y="78"  text-anchor="end" font-size="14">ChatGPT</text>
    <rect x="150" y="62"  width="500" height="26" fill="url(#barUsers)" rx="4"/>
    <text class="val" x="660" y="80" font-size="13">800 mln</text>
    <!-- Gemini 750 -->
    <text class="modelLbl" x="145" y="114" text-anchor="end" font-size="14">Gemini</text>
    <rect x="150" y="98"  width="469" height="26" fill="url(#barUsers)" rx="4"/>
    <text class="val" x="629" y="116" font-size="13">750 mln</text>
    <!-- Copilot 150 -->
    <text class="modelLbl" x="145" y="150" text-anchor="end" font-size="14">Copilot</text>
    <rect x="150" y="134" width="94"  height="26" fill="url(#barUsers)" rx="4"/>
    <text class="val" x="254" y="152" font-size="13">~150 mln</text>
    <!-- DeepSeek 97 -->
    <text class="modelLbl" x="145" y="186" text-anchor="end" font-size="14">DeepSeek</text>
    <rect x="150" y="170" width="61"  height="26" fill="url(#barUsers)" rx="4"/>
    <text class="val" x="221" y="188" font-size="13">97 mln</text>
    <!-- Grok 35 -->
    <text class="modelLbl" x="145" y="222" text-anchor="end" font-size="14">Grok</text>
    <rect x="150" y="206" width="22"  height="26" fill="url(#barUsers)" rx="4"/>
    <text class="val" x="182" y="224" font-size="13">35 mln</text>
    <!-- Perplexity 22 -->
    <text class="modelLbl" x="145" y="258" text-anchor="end" font-size="14">Perplexity</text>
    <rect x="150" y="242" width="14"  height="26" fill="url(#barUsers)" rx="4"/>
    <text class="val" x="174" y="260" font-size="13">22 mln</text>
    <!-- Claude 19 -->
    <text class="modelLbl" x="145" y="294" text-anchor="end" font-size="14">Claude</text>
    <rect x="150" y="278" width="12"  height="26" fill="url(#barUsers)" rx="4"/>
    <text class="val" x="172" y="296" font-size="13">19 mln</text>
  </g>

  <!-- ============================================================
       SEKCJA GORNA – PRAWA: TABELA (KOPIA) z kolumna "zastosowanie"
       ============================================================ -->
  <g id="table2" transform="translate(870,180)">
    <text class="h2" x="0" y="0" font-size="20">Porownanie modeli AI</text>
    <text class="axis" x="0" y="22" font-size="12">firma • zasieg • zastosowanie</text>

    <!-- Naglowek -->
    <rect x="0" y="40" width="670" height="42" fill="#1B2C44" rx="6"/>
    <text class="th" x="18"  y="67" font-size="15">AI</text>
    <text class="th" x="130" y="67" font-size="15">firma</text>
    <text class="th" x="260" y="67" font-size="15">uzytkownicy</text>
    <text class="th" x="400" y="67" font-size="15">zastosowanie</text>

    <!-- Wiersze (6 modeli, 38px wysokosc) -->
    <g font-size="13">
      <!-- ChatGPT -->
      <rect x="0" y="82"  width="670" height="38" fill="#152339"/>
      <text class="td"   x="18"  y="107">ChatGPT</text>
      <text class="td-s" x="130" y="107">OpenAI</text>
      <text class="td-s" x="260" y="107">800 mln / tydz</text>
      <text class="td-s" x="400" y="107">rozmowy, pisanie, kod, analiza</text>
      <!-- Gemini -->
      <rect x="0" y="120" width="670" height="38" fill="#10203A"/>
      <text class="td"   x="18"  y="145">Gemini</text>
      <text class="td-s" x="130" y="145">Google</text>
      <text class="td-s" x="260" y="145">750 mln / mies</text>
      <text class="td-s" x="400" y="145">Google Search, Gmail, Android</text>
      <!-- Copilot -->
      <rect x="0" y="158" width="670" height="38" fill="#152339"/>
      <text class="td"   x="18"  y="183">Copilot</text>
      <text class="td-s" x="130" y="183">Microsoft</text>
      <text class="td-s" x="260" y="183">~150 mln</text>
      <text class="td-s" x="400" y="183">Office 365, Windows, GitHub</text>
      <!-- Claude -->
      <rect x="0" y="196" width="670" height="38" fill="#10203A"/>
      <text class="td"   x="18"  y="221">Claude</text>
      <text class="td-s" x="130" y="221">Anthropic</text>
      <text class="td-s" x="260" y="221">19 mln / mies</text>
      <text class="td-s" x="400" y="221">programowanie, analiza, biznes</text>
      <!-- DeepSeek -->
      <rect x="0" y="234" width="670" height="38" fill="#152339"/>
      <text class="td"   x="18"  y="259">DeepSeek</text>
      <text class="td-s" x="130" y="259">DeepSeek</text>
      <text class="td-s" x="260" y="259">97 mln / mies</text>
      <text class="td-s" x="400" y="259">open-source, jez. azjat., rozumowanie</text>
      <!-- Grok -->
      <rect x="0" y="272" width="670" height="38" fill="#10203A"/>
      <text class="td"   x="18"  y="297">Grok</text>
      <text class="td-s" x="130" y="297">xAI / E. Musk</text>
      <text class="td-s" x="260" y="297">35 mln / mies</text>
      <text class="td-s" x="400" y="297">integracja z X, dane real-time</text>
    </g>

    <!-- Linie i ramka -->
    <g stroke="#233852" stroke-width="1" fill="none">
      <line x1="120" y1="40" x2="120" y2="310"/>
      <line x1="250" y1="40" x2="250" y2="310"/>
      <line x1="390" y1="40" x2="390" y2="310"/>
      <rect x="0" y="40" width="670" height="270" rx="6"/>
    </g>
  </g>

  <!-- ============================================================
       SEKCJA DOLNA – wykres slupkowy rynku AI
       ============================================================ -->
  <g id="marketChart" transform="translate(80,580)">
    <text class="h2" x="0" y="0" font-size="22">Eksplozja rynku AI – wartosc globalna (mld USD)</text>
    <text class="axis" x="0" y="24" font-size="13">prognoza wzrostu rynku oprogramowania i uslug AI 2020 – 2030</text>

    <!-- Os Y -->
    <g class="axis" font-size="11">
      <text x="50" y="80"  text-anchor="end">2500</text>
      <text x="50" y="160" text-anchor="end">2000</text>
      <text x="50" y="240" text-anchor="end">1500</text>
      <text x="50" y="320" text-anchor="end">1000</text>
      <text x="50" y="400" text-anchor="end">500</text>
      <text x="50" y="450" text-anchor="end">0</text>
    </g>

    <!-- Linie pomocnicze -->
    <g stroke="#1B2C44" stroke-width="1" stroke-dasharray="3,4">
      <line x1="60" y1="80"  x2="1440" y2="80"/>
      <line x1="60" y1="160" x2="1440" y2="160"/>
      <line x1="60" y1="240" x2="1440" y2="240"/>
      <line x1="60" y1="320" x2="1440" y2="320"/>
      <line x1="60" y1="400" x2="1440" y2="400"/>
    </g>
    <line x1="60" y1="450" x2="1440" y2="450" stroke="#233852" stroke-width="1.5"/>

    <!-- Sloupki: skala 1 mld = 0.16 px (500 mld = 80 px, 2500 mld = 400 px wys.)
         baselina y=450; wys = mld*0.16
         Wartosci: 2020:50, 2021:90, 2022:140, 2023:200, 2024:280, 2025:550, 2026:900, 2030:2100  -->

    <!-- 2020 - 50 -->
    <g transform="translate(140,0)">
      <rect x="0" y="442" width="100" height="8"  fill="url(#barGrowth)" rx="3"/>
      <text class="modelLbl" x="50" y="430" text-anchor="middle" font-size="12">GPT-3</text>
      <text class="yearLbl"  x="50" y="478" text-anchor="middle" font-size="16">2020</text>
      <text class="val"      x="50" y="420" text-anchor="middle" font-size="11">50</text>
    </g>
    <!-- 2021 - 90 -->
    <g transform="translate(290,0)">
      <rect x="0" y="436" width="100" height="14" fill="url(#barGrowth)" rx="3"/>
      <text class="modelLbl" x="50" y="424" text-anchor="middle" font-size="12">Copilot</text>
      <text class="yearLbl"  x="50" y="478" text-anchor="middle" font-size="16">2021</text>
      <text class="val"      x="50" y="414" text-anchor="middle" font-size="11">90</text>
    </g>
    <!-- 2022 - 140 -->
    <g transform="translate(440,0)">
      <rect x="0" y="428" width="100" height="22" fill="url(#barGrowth)" rx="3"/>
      <text class="modelLbl" x="50" y="416" text-anchor="middle" font-size="12">ChatGPT</text>
      <text class="yearLbl"  x="50" y="478" text-anchor="middle" font-size="16">2022</text>
      <text class="val"      x="50" y="406" text-anchor="middle" font-size="11">140</text>
    </g>
    <!-- 2023 - 200 -->
    <g transform="translate(590,0)">
      <rect x="0" y="418" width="100" height="32" fill="url(#barGrowth)" rx="3"/>
      <text class="modelLbl" x="50" y="406" text-anchor="middle" font-size="12">GPT-4 / Claude</text>
      <text class="yearLbl"  x="50" y="478" text-anchor="middle" font-size="16">2023</text>
      <text class="val"      x="50" y="396" text-anchor="middle" font-size="11">200</text>
    </g>
    <!-- 2024 - 280 -->
    <g transform="translate(740,0)">
      <rect x="0" y="405" width="100" height="45" fill="url(#barGrowth)" rx="3"/>
      <text class="modelLbl" x="50" y="393" text-anchor="middle" font-size="12">Claude 3</text>
      <text class="yearLbl"  x="50" y="478" text-anchor="middle" font-size="16">2024</text>
      <text class="val"      x="50" y="383" text-anchor="middle" font-size="11">280</text>
    </g>
    <!-- 2025 - 550 -->
    <g transform="translate(890,0)">
      <rect x="0" y="362" width="100" height="88" fill="url(#barGrowth)" rx="3"/>
      <text class="modelLbl" x="50" y="350" text-anchor="middle" font-size="12">Claude 4 / GPT-5</text>
      <text class="yearLbl"  x="50" y="478" text-anchor="middle" font-size="16">2025</text>
      <text class="val"      x="50" y="340" text-anchor="middle" font-size="11">550</text>
    </g>
    <!-- 2026 - 900 -->
    <g transform="translate(1040,0)">
      <rect x="0" y="306" width="100" height="144" fill="url(#barGrowth)" rx="3"/>
      <text class="modelLbl" x="50" y="294" text-anchor="middle" font-size="12">Claude 4.7 / GPT-5.5</text>
      <text class="yearLbl"  x="50" y="478" text-anchor="middle" font-size="16">2026</text>
      <text class="val"      x="50" y="284" text-anchor="middle" font-size="11">900</text>
    </g>
    <!-- 2030 - 2100 prognoza -->
    <g transform="translate(1240,0)">
      <rect x="0" y="114" width="120" height="336" fill="url(#barForecast)" rx="4"/>
      <text class="modelLbl" x="60" y="102" text-anchor="middle" font-size="12" fill="#4CC9F0">prognoza</text>
      <text class="yearLbl"  x="60" y="478" text-anchor="middle" font-size="16">2030</text>
      <text class="val"      x="60" y="92"  text-anchor="middle" font-size="13">2 100</text>
    </g>

    <!-- Strzalka trendu -->
    <path d="M 190,440 Q 700,420 1100,300 T 1300,140"
          stroke="#F77F5A" stroke-width="2" fill="none" stroke-dasharray="6,5" opacity="0.55"/>
  </g>

  <!-- Stopka -->
  <g id="footer">
    <text class="axis" x="800" y="1075" font-size="11" text-anchor="middle">
      zrodla: dane producentow, Statista, IDC, McKinsey • opracowanie wlasne • 2026
    </text>
  </g>

</svg>
