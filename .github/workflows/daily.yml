name: Daily viral scripts

on:
  schedule:
    # 05:00 UTC = 06:00 PL zima / 07:00 PL lato. Skrypty czekaja zanim wstaniesz.
    # UWAGA: cron dziala TYLKO na default branch (main).
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      skip_telegram:
        description: "Pomin wyslanie na Telegram (tylko zapis do repo)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Cookies dla TT/IG (opcjonalne - jak nie ma, TT/IG zostaja pominiete z warningiem)
      TIKTOK_COOKIES_CONTENT: ${{ secrets.TIKTOK_COOKIES }}
      INSTAGRAM_COOKIES_CONTENT: ${{ secrets.INSTAGRAM_COOKIES }}
      # Apify (opcjonalne - jak ustawione, social.py uzyje Apify zamiast yt-dlp+cookies)
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      SCRIPTS_PER_DAY: "3"
      CHANNEL_MIN_VIEWS: ${{ vars.CHANNEL_MIN_VIEWS || '100000' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check - sekrety
        run: |
          missing=()
          if [ -z "${GEMINI_API_KEY}" ]; then missing+=("GEMINI_API_KEY"); fi
          if [ -z "${GROQ_API_KEY}" ]; then missing+=("GROQ_API_KEY"); fi
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then missing+=("TELEGRAM_BOT_TOKEN"); fi
          if [ -z "${TELEGRAM_CHAT_ID}" ]; then missing+=("TELEGRAM_CHAT_ID"); fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Brakuje sekretow: ${missing[*]}"
            echo "::error::Dodaj je w: Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "Sekrety obecne."
          [ -n "${TIKTOK_COOKIES_CONTENT}" ] && echo "TIKTOK_COOKIES ustawione - TT bedzie aktywny." || echo "TIKTOK_COOKIES brak - TT bedzie pominiety."
          [ -n "${INSTAGRAM_COOKIES_CONTENT}" ] && echo "INSTAGRAM_COOKIES ustawione - IG bedzie aktywny." || echo "INSTAGRAM_COOKIES brak - IG bedzie pominiety."
          [ -n "${APIFY_TOKEN}" ] && echo "APIFY_TOKEN ustawione - mozliwy backup scrape." || echo "APIFY_TOKEN brak."

      - name: Sanity check - swipe-file
        run: |
          if [ ! -s data/swipe-file.txt ]; then
            echo "::error::data/swipe-file.txt pusty."
            exit 1
          fi
          non_comment=$(grep -v '^[[:space:]]*#' data/swipe-file.txt | grep -v '^[[:space:]]*$' | wc -l)
          if [ "$non_comment" -lt 1 ]; then
            echo "::error::Zero aktywnych linkow w data/swipe-file.txt"
            exit 1
          fi
          echo "Aktywnych linkow: $non_comment"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify yt-dlp
        run: yt-dlp --version

      - name: Run pipeline
        run: |
          if [ "${{ inputs.skip_telegram }}" = "true" ]; then
            python -m src.main --no-telegram
          else
            python -m src.main
          fi

      - name: Commit generated scripts
        if: success()
        run: |
          git config user.name "viral-engine[bot]"
          git config user.email "viral-engine@users.noreply.github.com"
          git add scripts/
          if git diff --cached --quiet; then
            echo "No new scripts to commit."
          else
            git commit -m "scripts: $(date -u +%Y-%m-%d) daily run"
            git push
          fi

      - name: Telegram alert on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=Viral pipeline FAILED on $(date -u +%Y-%m-%d). Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
